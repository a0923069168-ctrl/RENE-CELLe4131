<style>

<script>
/* ===== 設定區：部署 GAS 後 把網址貼在這裡 ===== */
const GAS_URL = "https://script.google.com/macros/s/AKfycbwo35O3wXivSperGEOfNQY5iOAEv_7oatf6viVS92ybmDDygpCqIVbM8aZ_2t32km8JVA/exec";
/* ============================================ */

const tabs = document.querySelectorAll('nav .tab');
const pages = document.querySelectorAll('.page');
tabs.forEach(btn=>{
  btn.addEventListener('click',()=>{
    tabs.forEach(b=>b.classList.remove('active'));
    pages.forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('page-'+btn.dataset.page).classList.add('active');
    if(btn.dataset.page==='today') loadToday();
    if(btn.dataset.page==='appointments') loadAppointments();
  });
});

function isConfigured(){
  return GAS_URL && GAS_URL.indexOf('http')===0;
}
if(!isConfigured()){
  document.getElementById('configBanner').style.display='block';
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}

async function apiGet(params){
  if(!isConfigured()) return {ok:false, error:'尚未設定 GAS_URL'};
  const url = GAS_URL + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url);
  return res.json();
}

async function apiPost(body){
  if(!isConfigured()) return {ok:false, error:'尚未設定 GAS_URL'};
  if(location.protocol === 'file:' && (body.action === 'add' || body.action === 'updateStatus')){
    await fetch(GAS_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(body)
    });
    return {ok:true, noReadback:true};
  }
  try{
    const res = await fetch(GAS_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(body)
    });
    return res.json();
  }catch(err){
    await fetch(GAS_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(body)
    });
    return {ok:true, noReadback:true};
  }
}

function statusBadge(status){
  const map = {
    '已購買':'active','已體驗':'active',
    '待追蹤':'wait','新客':'wait','已預約':'wait',
    '已取消':'cancel'
  };
  const cls = map[status] || 'wait';
  return `<span class="badge ${cls}">${status||'未設定'}</span>`;
}

function formatCalendarDate(value, addMinutes=0){
  const date = new Date(value);
  if(Number.isNaN(date.getTime())) return '';
  date.setMinutes(date.getMinutes() + addMinutes);
  const pad = n => String(n).padStart(2,'0');
  return [
    date.getFullYear(),
    pad(date.getMonth()+1),
    pad(date.getDate())
  ].join('') + 'T' + [
    pad(date.getHours()),
    pad(date.getMinutes()),
    '00'
  ].join('');
}

function combineDateTime(dateValue, timeValue){
  if(!dateValue || !timeValue || timeValue === '未設定') return '';
  return `${dateValue}T${timeValue}`;
}

function friendlyDateTime(value){
  if(!value) return '';
  const date = new Date(value);
  if(Number.isNaN(date.getTime())) return String(value);
  const pad = n => String(n).padStart(2,'0');
  return `${date.getFullYear()}/${pad(date.getMonth()+1)}/${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

function todayDateTime(timeValue){
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const datePart = [now.getFullYear(), pad(now.getMonth()+1), pad(now.getDate())].join('-');
  return `${datePart}T${timeValue}`;
}

function openGoogleCalendarReminder(data){
  if(!data){
    const form = document.getElementById('addForm');
    data = {};
    new FormData(form).forEach((v,k)=>data[k]=v);
  }
  const now = new Date();
  const reminderHourMinute = data['提醒時間'] || '10:00';
  const [rh, rm] = reminderHourMinute.split(':').map(Number);
  const reminderTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), rh, rm, 0);
  const customerName = data['客戶姓名'] || '客戶';
  const trackType = data['追蹤區分'] && data['追蹤區分'] !== '未選擇' ? data['追蹤區分'] : '追蹤';
  const details = [
    data['電話'] ? `電話：${data['電話']}` : '',
    data['LINE名稱'] ? `LINE：${data['LINE名稱']}` : '',
    data['購買方案'] && data['購買方案'] !== '未選擇' ? `購買方案：${data['購買方案']}` : '',
    data['後援人'] ? `後援人：${data['後援人']}` : '',
    data['排線'] ? `排線：${data['排線']}` : '',
    data['備註'] ? `備註：${data['備註']}` : ''
  ].filter(Boolean).join('\n');
  [1,4,6].forEach(day=>{
    const baseDate = new Date(reminderTime);
    baseDate.setDate(baseDate.getDate() + day);
    const start = formatCalendarDate(baseDate);
    const end = formatCalendarDate(baseDate, 30);
    const title = `${customerName}｜${trackType}第${day}日提醒`;
    const url = 'https://calendar.google.com/calendar/render?action=TEMPLATE'
      + '&text=' + encodeURIComponent(title)
      + '&dates=' + encodeURIComponent(`${start}/${end}`)
      + '&ctz=Asia%2FTaipei'
      + '&details=' + encodeURIComponent(details);
    window.open(url, '_blank');
  });
}

/* ---- 今日追蹤 ---- */
async function loadToday(){
  const list = document.getElementById('todayList');
  list.innerHTML = '<div class="empty-state">讀取中…</div>';
  const res = await apiGet({action:'today'});
  if(!res.ok){ list.innerHTML = `<div class="empty-state">${res.error||'讀取失敗'}</div>`; return; }
  if(res.data.length===0){
    list.innerHTML = `<div class="empty-state"><div class="icon">◇</div>今天沒有需要追蹤的客戶</div>`;
    return;
  }
  list.innerHTML = res.data.map(row=>`
    <div class="card">
      <div class="row-track">
        <div>
          <div class="card-title">${row['客戶姓名']||''}</div>
          <div class="card-meta">${row['追蹤區分']||row['追蹤類型']||''}　上次內容：${row['追蹤內容']||'—'}</div>
          <div class="card-meta">上次反應：${row['客戶反應']||'—'}</div>
        </div>
        <button class="small" onclick="markDone('${row['追蹤ID']}')">標記已完成</button>
      </div>
    </div>
  `).join('');
}

async function markDone(id){
  const res = await apiPost({
    action:'updateStatus', sheet:'追蹤紀錄表',
    idField:'追蹤ID', id:id, updates:{'是否完成':'是'}
  });
  if(res.ok){ showToast('已標記完成'); loadToday(); }
  else showToast(res.error||'操作失敗');
}

/* ---- 客戶查詢 ---- */
async function doSearch(){
  const kw = document.getElementById('searchInput').value.trim();
  const results = document.getElementById('searchResults');
  results.innerHTML = '<div class="empty-state">搜尋中…</div>';
  const res = await apiGet({action:'search', sheet:'客戶資料表', keyword:kw});
  if(!res.ok){ results.innerHTML = `<div class="empty-state">${res.error||'搜尋失敗'}</div>`; return; }
  if(res.data.length===0){
    results.innerHTML = `<div class="empty-state"><div class="icon">◇</div>找不到符合的客戶</div>`;
    return;
  }
  results.innerHTML = res.data.map(c=>`
    <div class="card">
      <div class="card-title">${c['客戶姓名']||''}</div>
      <div class="card-meta">${c['電話']||''}　${c['LINE名稱']?'LINE：'+c['LINE名稱']:''}</div>
      <div>${statusBadge(c['客戶狀態'])}</div>
      <div class="card-meta" style="margin-top:8px;">來源：${c['客戶來源']||'—'}　負責：${c['負責夥伴']||'—'}</div>
      ${c['備註']?`<div class="card-meta">備註：${c['備註']}</div>`:''}
    </div>
  `).join('');
}
document.getElementById('searchInput').addEventListener('keydown',e=>{
  if(e.key==='Enter') doSearch();
});

/* ---- 新增客戶 ---- */
async function submitCustomer(e){
  e.preventDefault();
  const form = e.target;
  const data = {};
  new FormData(form).forEach((v,k)=>data[k]=v);
  data['Google日曆提醒時間'] = todayDateTime(data['提醒時間'] || '10:00');
  data['預約日期時間'] = combineDateTime(data['預約日期'], data['預約時間']);
data['其它提醒日期時間'] = combineDateTime(data['其它提醒日期'], data['其它提醒時間']);

  try{
    if(location.protocol === 'file:') throw new Error('本機預覽略過電話查重');
    const check = await apiPost({action:'checkPhone', phone:data['電話']});
    if(check.ok && check.data && check.data.length>0){
      showToast('這支電話已經是客戶了，請改用查詢');
      return;
    }
  }catch(err){
    // 本機預覽若無法讀取查重結果，仍允許先新增資料。
  }

  const res = await apiPost({action:'add', sheet:'客戶資料表', data});
  if(res.ok){
    showToast(res.noReadback ? '已送出，請到試算表確認' : '客戶新增成功，日曆提醒已建立');
    form.reset();
  } else {
    showToast(res.error||'新增失敗');
  }
}

/* ---- 預約名單 ---- */
async function loadAppointments(){
  const list = document.getElementById('appointmentList');
  list.innerHTML = '<div class="empty-state">讀取中…</div>';
  const res = await apiGet({action:'list', sheet:'預約紀錄表'});
  if(!res.ok){ list.innerHTML = `<div class="empty-state">${res.error||'讀取失敗'}</div>`; return; }
  if(res.data.length===0){
    list.innerHTML = `<div class="empty-state"><div class="icon">◇</div>目前沒有預約紀錄</div>`;
    return;
  }
  list.innerHTML = res.data.map(a=>`
    <div class="card">
      <div class="card-title">${a['客戶姓名／電話']||''}</div>
      <div class="card-meta">${a['預約項目']||''}</div>
      <div class="card-meta">${friendlyDateTime(a['預約日期時間'])}</div>
      <div>${statusBadge(a['狀態'])}</div>
    </div>
  `).join('');
}
