<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RENE CELL 客戶管理系統</title>

<!-- 加到主畫面（偽 App）相關設定 -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon-32x32.png" sizes="32x32" type="image/png">
<link rel="icon" href="favicon-16x16.png" sizes="16x16" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#345B31">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RENE CELL">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5FAF3;
    --surface:#FFFFFF;
    --surface-alt:#E7F2E2;
    --accent:#8FBF83;
    --accent-deep:#345B31;
    --text-primary:#162616;
    --text-secondary:#465C42;
    --border:#D6E5CF;
    --status-active:#6F9B67;
    --status-wait:#9AAF6C;
    --status-cancel:#B08585;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text-primary);
    font-family:'Noto Sans TC',sans-serif;
    min-height:100vh;
    padding-bottom:60px;
    position:relative;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:url("bg.jpg") center / cover no-repeat;
    opacity:.12;
    pointer-events:none;
    z-index:0;
  }
  body > *{
    position:relative;
    z-index:1;
  }
  header{
    padding:36px 24px 20px;
    text-align:center;
    border-bottom:1px solid var(--border);
    background:var(--surface);
  }
  header .brand{
    font-family:'Noto Serif TC',serif;
    font-weight:600;
    font-size:12px;
    letter-spacing:3px;
    color:var(--text-secondary);
  }
  header .sub{
    font-family:'Noto Serif TC',serif;
    font-size:26px;
    font-weight:600;
    letter-spacing:4px;
    color:var(--accent-deep);
    margin-top:6px;
  }
 nav{
  display:grid;
  grid-template-columns:repeat(4, minmax(0, 1fr));
  gap:12px;
  width:calc(100% - 64px);
  max-width:1180px;
  margin:0 auto;
  background:rgba(255,255,255,.88);
  border-bottom:none;
  padding:16px 0;
  }
 nav button{
  background:rgba(255,255,255,.76);
  border:1px solid var(--border);
  min-height:58px;
  padding:0 18px;
  font-family:'Noto Serif TC',serif;
  font-size:20px;
  font-weight:600;
  color:var(--text-secondary);
  cursor:pointer;
  border-radius:4px;
  transition:all .2s;
  letter-spacing:2px;
  }
  nav button.active{
    background:var(--surface-alt);
    color:var(--accent-deep);
    border-color:var(--accent);
    box-shadow:0 2px 8px rgba(139,94,77,.12);
    font-size:21px;
  }
  nav button:hover{
    color:var(--accent-deep);
    border-color:var(--accent);
  }
  main{
   max-width:1180px;
   width:calc(100% - 64px);
   margin:0 auto;
   padding:32px 0 48px;
  }
  .page{display:none;}
  .page.active{display:block;animation:fadeIn .3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:4px;
    padding:20px 22px;
    margin-bottom:14px;
    border-left:4px solid var(--border);
  }
  .group-header{
    display:flex;
    align-items:center;
    gap:8px;
    margin:26px 0 12px;
    font-family:'Noto Serif TC',serif;
    font-size:15px;
    font-weight:500;
    color:var(--accent-deep);
    letter-spacing:1px;
  }
  .group-header:first-child{ margin-top:6px; }
  .group-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    flex-shrink:0;
  }
  .group-count{
    font-size:12px;
    color:var(--text-secondary);
    font-family:'Noto Sans TC',sans-serif;
  }
  .cat-體驗{ border-left-color:#A8C3A0; }
  .cat-新會員使用產品{ border-left-color:#D8C9A8; }
  .cat-種鑽{ border-left-color:#C9A88F; }
  .cat-卸鑽{ border-left-color:#B0A8A0; }
  .cat-未購買追蹤{ border-left-color:#B08968; }
  .card-title{
    font-family:'Noto Serif TC',serif;
    font-size:17px;
    font-weight:500;
    color:var(--accent-deep);
    margin-bottom:4px;
  }
  .card-meta{
    font-size:13px;
    color:var(--text-secondary);
    margin-bottom:10px;
  }
  .badge{
    display:inline-block;
    font-size:11px;
    padding:3px 10px;
    border-radius:20px;
    letter-spacing:1px;
    margin-right:6px;
  }
  .badge.active{background:#EAEFE3;color:var(--status-active);}
  .badge.wait{background:#F5E9DB;color:var(--status-wait);}
  .badge.cancel{background:#F1E1E1;color:var(--status-cancel);}

  .search-bar{
    display:flex;
    gap:10px;
    margin-bottom:20px;
  }
  input, select, textarea{
    font-family:'Noto Sans TC',sans-serif;
    font-size:14px;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:4px;
    background:var(--surface);
    color:var(--text-primary);
    width:100%;
  }
  input:focus, select:focus, textarea:focus{
    outline:none;
    border-color:var(--accent);
  }
  .search-bar input{flex:1;}
  button.primary{
    background:var(--accent);
    color:#fff;
    border:none;
    padding:10px 22px;
    border-radius:4px;
    font-family:'Noto Sans TC',sans-serif;
    font-size:14px;
    cursor:pointer;
    letter-spacing:1px;
    transition:background .2s;
  }
  button.primary:hover{background:var(--accent-deep);}
  button.secondary{
    background:var(--surface);
    color:var(--accent-deep);
    border:1px solid var(--accent);
    padding:10px 18px;
    border-radius:4px;
    font-family:'Noto Sans TC',sans-serif;
    font-size:14px;
    cursor:pointer;
    letter-spacing:1px;
  }
  button.secondary:hover{background:var(--surface-alt);}

  form .field{margin-bottom:14px;}
  form label{
    display:block;
    font-size:13px;
    color:var(--text-secondary);
    margin-bottom:6px;
    letter-spacing:1px;
  }
  .form-grid{
  display:grid;
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:18px 20px;
}

@media(max-width:900px){
  main{width:calc(100% - 32px);}
  .form-grid{grid-template-columns:1fr 1fr;}
}

@media(max-width:600px){
  main{width:calc(100% - 24px);}
  .form-grid{grid-template-columns:1fr;}
}
  .form-section{
    margin:6px 0 14px;
    padding:16px;
    border:1px solid var(--border);
    background:rgba(231,242,226,.48);
  }
  .form-section.reminder-section{
    border-color:#DCCAA2;
    background:#FFF8E8;
  }
  .form-section.reminder-section .form-section-title{
    color:#7A6234;
  }
  .form-section-title{
    font-family:'Noto Serif TC',serif;
    font-size:16px;
    font-weight:500;
    color:var(--accent-deep);
    margin-bottom:12px;
    letter-spacing:1px;
  }
  .form-actions{
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
  }
  .form-note{
    color:#7A6234;
    font-size:13px;
    text-align:center;
    line-height:1.7;
    letter-spacing:1px;
  }

  .check-group{
    display:flex;
    flex-wrap:wrap;
    gap:10px 18px;
    margin-bottom:12px;
  }
  .check-group label{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13px;
    color:var(--text-secondary);
    margin:0;
    cursor:pointer;
    white-space:nowrap;
  }
  .check-group input[type="checkbox"]{
    width:auto;
    padding:0;
    accent-color:var(--accent);
    cursor:pointer;
  }

  .empty-state{
    text-align:center;
    padding:50px 20px;
    color:var(--text-secondary);
  }
  .empty-state .icon{font-size:32px;margin-bottom:10px;}

  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%);
    background:var(--accent-deep);
    color:#fff;
    padding:12px 24px;
    border-radius:4px;
    font-size:14px;
    opacity:0;
    transition:opacity .3s;
    pointer-events:none;
    z-index:100;
  }
  .toast.show{opacity:1;}

  .config-banner{
    background:#F5E9DB;
    color:var(--status-wait);
    padding:12px 20px;
    text-align:center;
    font-size:13px;
  }

  .notify-banner{
    max-width:1180px;
    width:calc(100% - 64px);
    margin:18px auto 0;
    background:#FFF8E8;
    border:1px solid #DCCAA2;
    border-left:4px solid #B38A3C;
    border-radius:4px;
    padding:14px 18px;
    font-size:14px;
    color:#7A6234;
    line-height:1.9;
    position:relative;
  }
  .notify-banner .notify-title{
    font-family:'Noto Serif TC',serif;
    font-size:15px;
    font-weight:600;
    letter-spacing:2px;
    margin-bottom:4px;
    color:#7A6234;
  }
  .notify-banner .notify-close{
    position:absolute;
    top:10px;
    right:14px;
    background:none;
    border:none;
    color:#B38A3C;
    font-size:16px;
    cursor:pointer;
    line-height:1;
  }
  @media(max-width:900px){.notify-banner{width:calc(100% - 32px);}}
  @media(max-width:600px){.notify-banner{width:calc(100% - 24px);}}

  .row-track{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
  }
  .row-track button.small{
    background:none;
    border:1px solid var(--accent);
    color:var(--accent-deep);
    padding:6px 14px;
    border-radius:4px;
    font-size:12px;
    cursor:pointer;
  }
  .row-track button.small:hover{background:var(--surface-alt);}

  /* ---- 精簡列表：今日追蹤 ---- */
  .list-row{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:4px;
    margin-bottom:8px;
  }
  .list-head{
    display:flex;
    align-items:center;
    gap:10px;
    padding:11px 14px;
    cursor:pointer;
    flex-wrap:wrap;
  }
  .list-head:hover{background:var(--surface-alt);}
  .list-head .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .list-head .name{
    font-family:'Noto Serif TC',serif;
    font-size:15px;
    font-weight:500;
    color:var(--accent-deep);
  }
  .list-head .meta{font-size:13px;color:var(--text-secondary);}
  .list-head .snippet{
    font-size:12px;
    color:var(--text-secondary);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    flex:1;
    min-width:60px;
  }
  .list-head .arrow{
    margin-left:auto;
    color:var(--accent);
    font-size:11px;
    transition:transform .2s;
  }
  .list-row.open .arrow{transform:rotate(180deg);}
  .list-body{
    display:none;
    padding:6px 14px 14px;
    border-top:1px dashed var(--border);
  }
  .list-row.open .list-body{display:block;}

  /* ---- 精簡列表：預約名單 ---- */
  .appt-row{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    background:var(--surface);
    border:1px solid var(--border);
    border-left:4px solid var(--accent);
    border-radius:4px;
    padding:10px 14px;
    margin-bottom:8px;
    font-size:13px;
    color:var(--text-secondary);
  }
  .appt-row.expired{border-left-color:#B44;}
  .appt-row .time{
    font-weight:600;
    color:var(--accent-deep);
    min-width:52px;
  }
  .appt-row .name{
    font-family:'Noto Serif TC',serif;
    font-size:15px;
    font-weight:500;
    color:var(--accent-deep);
  }
  .appt-row select{
    width:auto;
    min-width:96px;
    margin-left:auto;
    padding:6px 8px;
    font-size:13px;
  }
</style>
</head>
<body>

<header>
  <div class="brand">RENE CELL</div>
  <div class="sub">客戶管理系統</div>
</header>

<nav>
  <button class="tab active" data-page="today">今日追蹤</button>
  <button class="tab" data-page="search">客戶查詢</button>
  <button class="tab" data-page="add">新增客戶</button>
  <button class="tab" data-page="appointments">預約名單</button>
</nav>

<div id="configBanner" class="config-banner" style="display:none;">
  尚未設定後端連線網址，請編輯本檔案中的 GAS_URL 常數
</div>

<div id="notifyBanner" class="notify-banner" style="display:none;"></div>

<main>

  <section id="page-today" class="page active">
    <div class="card-title" style="margin-bottom:14px;">今天需要追蹤的客戶</div>
    <div id="todayList"></div>
  </section>

  <section id="page-search" class="page">
    <div class="search-bar">
      <input id="searchInput" placeholder="輸入姓名、電話或 LINE 名稱搜尋">
      <button class="primary" onclick="doSearch()">搜尋</button>
    </div>
    <div id="searchResults"></div>
  </section>

  <section id="page-add" class="page">
    <div class="card">
      <div class="card-title">新增客戶資料</div>
      <form id="addForm" onsubmit="submitCustomer(event)">
        <div class="form-grid">
          <div class="field">
            <label>客戶姓名 *</label>
            <input name="客戶姓名" required>
          </div>
          <div class="field">
            <label>電話 *</label>
            <input name="電話" required>
          </div>
          <div class="field">
            <label>LINE名稱</label>
            <input name="LINE名稱">
          </div>
          <div class="field">
            <label>客戶來源</label>
            <select name="客戶來源">
              <option>FB</option><option>IG</option><option>LINE</option>
              <option>朋友介紹</option><option>現場活動</option>
            </select>
          </div>
          <div class="field">
            <label>負責夥伴</label>
            <input name="負責夥伴">
          </div>
          <div class="field">
            <label>客戶狀態</label>
            <select name="客戶狀態">
              <option>新客</option><option>已預約</option><option>已體驗</option>
              <option>已購買</option><option>未購買</option><option>待追蹤</option><option>已取消</option>
            </select>
          </div>
          <div class="field">
            <label>購買方案</label>
            <select name="購買方案">
              <option>未選擇</option>
              <option>女神VIP保養計畫</option>
              <option>小資試用方案</option>
              <option>經理單</option>
              <option>散買</option>
            </select>
          </div>
        </div>
        <div class="form-section">
          <div class="form-section-title">膚況（可複選）</div>
          <div class="check-group">
            <label><input type="checkbox" name="膚況選項" value="油性毛孔">皮膚油、毛孔粗大</label>
            <label><input type="checkbox" name="膚況選項" value="暗黃">暗黃、膚色不均</label>
            <label><input type="checkbox" name="膚況選項" value="乾燥">皮膚乾燥缺水</label>
            <label><input type="checkbox" name="膚況選項" value="斑點">雀斑黑色素</label>
            <label><input type="checkbox" name="膚況選項" value="痘痘">粉刺痘痘</label>
            <label><input type="checkbox" name="膚況選項" value="鬆弛">鬆弛、需提升緊緻</label>
            <label><input type="checkbox" name="膚況選項" value="敏感">面部紅血絲、敏感</label>
          </div>
          <div class="field" style="margin-bottom:0;">
            <label>膚況備註（過敏史、3個月內醫美項目、其他補充）</label>
            <input type="text" name="膚況備註" placeholder="例如：對酒精過敏、上個月做過皮秒">
          </div>
        </div>
        <div class="form-section">
          <div class="form-section-title">後援人與排線資訊</div>
          <div class="form-grid">
            <div class="field">
              <label>註冊會員編號</label>
              <input name="註冊會員編號" placeholder="可填會員編號">
            </div>
            <div class="field">
              <label>後援人</label>
              <input name="後援人" placeholder="可填姓名或會員編號">
            </div>
            <div class="field">
              <label>排線</label>
              <input name="排線" placeholder="自由填寫，不限制格式">
            </div>
          </div>
        </div>
        <div class="form-section reminder-section">
          <div class="form-section-title">追蹤提醒設定</div>
          <div class="form-grid">
            <div class="field">
              <label>追蹤區分（不追蹤可留在「未選擇」）</label>
              <select name="追蹤區分">
                <option>未選擇</option>
                <option>體驗</option>
                <option>新會員使用產品</option>
                <option>種鑽</option>
                <option>卸鑽</option>
                <option>未購買追蹤</option>
                <option>不需追蹤</option>
              </select>
            </div>
            <div class="field">
              <label>提醒方式</label>
              <select name="提醒方式" id="remindMode">
                <option>三次提醒</option>
                <option>單次提醒</option>
              </select>
            </div>
            <div class="field">
              <label id="remindDateLabel">開始日期（第1、4、6天提醒）</label>
              <input type="date" name="追蹤日期" id="followStartDate">
            </div>
            <div class="field">
              <label>提醒時間</label>
              <select name="提醒時間" id="followReminderTime">
                <option>10:00</option>
                <option>11:00</option>
                <option>12:00</option>
                <option>13:00</option>
                <option>14:00</option>
                <option>15:00</option>
                <option>16:00</option>
                <option>17:00</option>
                <option>18:00</option>
                <option>19:00</option>
                <option>20:00</option>
                <option>21:00</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <div class="form-note">三次提醒：以開始日期推算，第 1、4、6 天各建立一筆提醒。單次提醒：只在指定日期提醒一次。到期當天會出現在「今日追蹤」與頁面上方的今日提醒。</div>
          </div>
        </div>
        <div class="form-section">
          <div class="form-section-title">預約資料</div>
          <div class="form-grid">
            <div class="field">
              <label>預約名單區分</label>
              <select name="預約類型">
                <option>未選擇</option>
                <option>種鑽</option>
                <option>卸鑽</option>
                <option>體驗</option>
              </select>
            </div>
            <div class="field">
              <label>預約日期</label>
              <input type="date" name="預約日期">
            </div>
            <div class="field">
              <label>預約時間</label>
              <select name="預約時間">
                <option>未設定</option>
                <option>10:00</option>
                <option>11:00</option>
                <option>12:00</option>
                <option>13:00</option>
                <option>14:00</option>
                <option>15:00</option>
                <option>16:00</option>
                <option>17:00</option>
                <option>18:00</option>
                <option>19:00</option>
                <option>20:00</option>
                <option>21:00</option>
              </select>
            </div>
            <div class="field">
              <label>地點</label>
              <input type="text" name="地點" placeholder="例如：台中店、客戶家">
            </div>
          </div>
        </div>
        <div class="field">
          <label>備註</label>
          <textarea name="備註" rows="3"></textarea>
        </div>
        <button type="submit" class="primary">新增客戶</button>
      </form>
    </div>
  </section>

  <section id="page-appointments" class="page">
    <div id="appointmentList"></div>
  </section>

</main>

<div id="toast" class="toast"></div>

<script>
/* ===== 設定區：部署 GAS 後 把網址貼在這裡 ===== */
const GAS_URL = "https://script.google.com/macros/s/AKfycbwEH2QLNFh_816H6uMJI_7pwaOzx2Qbz_7Ygd5rfiNqWQF9a7ZdZt2yGOPtBe8W4yqkJw/exec";
/* ============================================ */

const tabs = document.querySelectorAll('nav .tab');
const pages = document.querySelectorAll('.page');
tabs.forEach(btn=>{
  btn.addEventListener('click',()=>{
    tabs.forEach(b=>b.classList.remove('active'));
    pages.forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('page-'+btn.dataset.page).classList.add('active');
    if(btn.dataset.page==='today') loadToday();
    if(btn.dataset.page==='appointments') loadAppointments();
  });
});

function isConfigured(){
  return GAS_URL && GAS_URL.indexOf('http')===0;
}
if(!isConfigured()){
  document.getElementById('configBanner').style.display='block';
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}

async function apiGet(params){
  if(!isConfigured()) return {ok:false, error:'尚未設定 GAS_URL'};
  const url = GAS_URL + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url);
  return res.json();
}

async function apiPost(body){
  if(!isConfigured()) return {ok:false, error:'尚未設定 GAS_URL'};
  if(location.protocol === 'file:' && (body.action === 'add' || body.action === 'updateStatus')){
    await fetch(GAS_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(body)
    });
    return {ok:true, noReadback:true};
  }
  try{
    const res = await fetch(GAS_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(body)
    });
    return res.json();
  }catch(err){
    await fetch(GAS_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(body)
    });
    return {ok:true, noReadback:true};
  }
}

function statusBadge(status){
  const map = {
    '已購買':'active','已體驗':'active',
    '待追蹤':'wait','新客':'wait','已預約':'wait',
    '已取消':'cancel'
  };
  const cls = map[status] || 'wait';
  return `<span class="badge ${cls}">${status||'未設定'}</span>`;
}

function combineDateTime(dateValue, timeValue){
  if(!dateValue || !timeValue || timeValue === '未設定') return '';
  return `${dateValue}T${timeValue}`;
}

function friendlyDateTime(value){
  if(!value) return '';
  const date = new Date(value);
  if(Number.isNaN(date.getTime())) return String(value);
  const pad = n => String(n).padStart(2,'0');
  return `${date.getFullYear()}/${pad(date.getMonth()+1)}/${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

function todayDatePart(){
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  return [now.getFullYear(), pad(now.getMonth()+1), pad(now.getDate())].join('-');
}

/* ---- 提醒方式切換：更新日期欄位說明 ---- */
document.getElementById('remindMode').addEventListener('change', e=>{
  document.getElementById('remindDateLabel').textContent =
    e.target.value === '單次提醒'
      ? '提醒日期'
      : '開始日期（第1、4、6天提醒）';
});

/* ---- 今日提醒面板（進入網頁自動顯示） ---- */
async function loadNotify(){
  const banner = document.getElementById('notifyBanner');
  try{
    const res = await apiGet({action:'notify'});
    if(!res.ok){ banner.style.display='none'; return; }

    const f = res.followUps || [];
    const a = res.appointments || [];
    if(f.length===0 && a.length===0){ banner.style.display='none'; return; }

    let html = `<button class="notify-close" onclick="this.parentElement.style.display='none'">✕</button>`;
    html += `<div class="notify-title">🔔 今日提醒</div>`;
    if(f.length>0){
      html += `<div>追蹤 ${f.length} 位：${f.map(x=>`${x.name}（${x.type}）`).join('、')}</div>`;
    }
    if(a.length>0){
      html += `<div>預約 ${a.length} 位：${a.map(x=>`${x.time}　${x.name}${x.phone?'（'+x.phone+'）':''}｜${x.type}${x.place?'＠'+x.place:''}`).join('、')}</div>`;
    }
    banner.innerHTML = html;
    banner.style.display='block';
  }catch(err){
    banner.style.display='none';
  }
}

/* ---- 今日追蹤 ---- */
const TRACK_CATEGORIES = [
  { name:'體驗', color:'#A8C3A0' },
  { name:'新會員使用產品', color:'#D8C9A8' },
  { name:'種鑽', color:'#C9A88F' },
  { name:'卸鑽', color:'#B0A8A0' },
  { name:'未購買追蹤', color:'#B08968' }
];

async function loadToday(){
  const list = document.getElementById('todayList');
  list.innerHTML = '<div class="empty-state">讀取中…</div>';
  const res = await apiGet({action:'today'});
  if(!res.ok){ list.innerHTML = `<div class="empty-state">${res.error||'讀取失敗'}</div>`; return; }
  if(res.data.length===0){
    list.innerHTML = `<div class="empty-state"><div class="icon">◇</div>今天沒有需要追蹤的客戶</div>`;
    return;
  }

  let html = '';
  TRACK_CATEGORIES.forEach(cat=>{
    const rows = res.data.filter(r => (r['追蹤類別']||'') === cat.name);
    if(rows.length === 0) return;

    html += `
      <div class="group-header">
        <span class="group-dot" style="background:${cat.color};"></span>
        ${cat.name}
        <span class="group-count">（${rows.length}位）</span>
      </div>
    `;
    html += rows.map(row => renderTrackCard(row, cat.name)).join('');
  });

  const others = res.data.filter(r => !TRACK_CATEGORIES.some(c => c.name === (r['追蹤類別']||'')));
  if(others.length > 0){
    html += `
      <div class="group-header">
        <span class="group-dot" style="background:#9AAF6C;"></span>
        其他提醒
        <span class="group-count">（${others.length}位）</span>
      </div>
    `;
    html += others.map(row => renderTrackCard(row, row['追蹤類別']||'')).join('');
  }

  list.innerHTML = html;
}

function renderTrackCard(row, catName){
  const uid = row['追蹤ID'];
  const name = row['客戶姓名']||'';
  const phone = row['電話']||'';
  const due = row['到期提醒']||'';
  const catColor = (TRACK_CATEGORIES.find(c=>c.name===catName)||{}).color || '#9AAF6C';
  const snippet = row['本次內容'] || row['提醒方式'] || '';
  const options = TRACK_CATEGORIES.map(c =>
    `<option${c.name===catName?' selected':''}>${c.name}</option>`
  ).join('');

  return `
    <div class="list-row" id="row-${uid}">
      <div class="list-head" onclick="toggleRow('${uid}')">
        <span class="dot" style="background:${catColor};"></span>
        <span class="name">${name}</span>
        <span class="meta">${phone}</span>
        <span class="snippet">${snippet}</span>
        <span class="arrow">▼</span>
      </div>
      <div class="list-body">
        ${row['提醒清單']?`<div class="card-meta" style="margin-top:8px;">提醒排程：${row['提醒清單']}</div>`:''}
        <div class="card-meta">上次內容：${row['本次內容']||'—'}</div>
        <div class="card-meta">上次皮膚情況：${row['皮膚情況']||'—'}</div>
        <div class="field" style="margin-top:6px;">
          <label>追蹤類別</label>
          <select id="cat-${uid}">${options}</select>
        </div>
        <div class="field">
          <input type="text" id="item-${uid}" placeholder="本次內容（例如：詢問使用狀況）">
        </div>
        <div class="field">
          <input type="text" id="skin-${uid}" placeholder="本次皮膚情況／客戶反應">
        </div>
        <div class="field">
          <label>下次追蹤日期時間（留空代表照原排程提醒）</label>
          <input type="datetime-local" id="next-${uid}">
        </div>
        <div class="form-actions">
          <button class="secondary" onclick="addFollowUp('${uid}','${due}',false)">新增本次記錄</button>
          <button class="primary" onclick="addFollowUp('${uid}','${due}',true)">記錄並設為完成</button>
        </div>
      </div>
    </div>
  `;
}

function toggleRow(uid){
  document.getElementById('row-'+uid).classList.toggle('open');
}

async function addFollowUp(uid, due, isDone){
  const cat = document.getElementById('cat-'+uid).value;
  const item = document.getElementById('item-'+uid).value.trim();
  const skin = document.getElementById('skin-'+uid).value.trim();
  const next = document.getElementById('next-'+uid).value;

  if(!cat){
    showToast('請選擇追蹤類別');
    return;
  }
  if(!item && !skin && !isDone){
    showToast('請至少填寫一項再送出');
    return;
  }

  const res = await apiPost({
    action:'appendNote',
    '追蹤ID': uid,
    '到期提醒': due,
    '追蹤類別': cat,
    '本次內容': item,
    '皮膚情況': skin,
    '下次追蹤日期': isDone ? '' : next,
    '是否完成': isDone ? '是' : '否'
  });
  if(res.ok){
    showToast(isDone ? '已標記完成' : '已新增追蹤記錄');
    loadToday();
    loadNotify();
  }
  else showToast(res.error||'操作失敗');
}

/* ---- 客戶查詢 ---- */
async function doSearch(){
  const kw = document.getElementById('searchInput').value.trim();
  const results = document.getElementById('searchResults');
  results.innerHTML = '<div class="empty-state">搜尋中…</div>';
  const res = await apiGet({action:'search', sheet:'客戶資料表', keyword:kw});
  if(!res.ok){ results.innerHTML = `<div class="empty-state">${res.error||'搜尋失敗'}</div>`; return; }
  if(res.data.length===0){
    results.innerHTML = `<div class="empty-state"><div class="icon">◇</div>找不到符合的客戶</div>`;
    return;
  }
  results.innerHTML = res.data.map(c=>{
    const skinTags = ['油性毛孔','暗黃','乾燥','斑點','痘痘','鬆弛','敏感']
      .filter(t=>String(c[t]||'').trim()==='✓');
    const skinNote = String(c['膚況備註']||'').trim();
    const skinText = skinTags.join('、') + (skinNote?`（${skinNote}）`:'');
    return `
    <div class="card">
      <div class="card-title">${c['客戶姓名']||''}</div>
      <div class="card-meta">${c['電話']||''}　${c['LINE名稱']?'LINE：'+c['LINE名稱']:''}</div>
      <div>${statusBadge(c['客戶狀態'])}</div>
      <div class="card-meta" style="margin-top:8px;">來源：${c['客戶來源']||'—'}　負責：${c['負責夥伴']||'—'}</div>
      ${skinText?`<div class="card-meta">膚況：${skinText}</div>`:''}
      ${c['備註']?`<div class="card-meta">備註：${c['備註']}</div>`:''}
    </div>
  `;
  }).join('');
}
document.getElementById('searchInput').addEventListener('keydown',e=>{
  if(e.key==='Enter') doSearch();
});

/* ---- 新增客戶 ---- */
async function submitCustomer(e){
  e.preventDefault();
  const form = e.target;
  const data = {};
  new FormData(form).forEach((v,k)=>data[k]=v);

  // 膚況：每個勾選寫入對應欄位（✓），備註獨立一欄；
  // 另組一份摘要給追蹤紀錄表當基準膚況（客戶資料表無此標題，不會寫入）
  const skinChecks = Array.from(form.querySelectorAll('input[name="膚況選項"]:checked'))
    .map(el=>el.value);
  skinChecks.forEach(tag=>data[tag]='✓');
  const skinNote = (data['膚況備註']||'').trim();
  data['膚況備註'] = skinNote;
  data['膚況摘要'] = skinChecks.join('、') + (skinNote ? `（${skinNote}）` : '');
  delete data['膚況選項'];

  const track = data['追蹤區分'] || '未選擇';
  const needFollow = track !== '未選擇' && track !== '不需追蹤';

  if(needFollow){
    const d = data['追蹤日期'] || todayDatePart();
    const t = data['提醒時間'] || '10:00';
    data['追蹤開始日期時間'] = `${d}T${t}`;
  }

  data['預約日期時間'] = combineDateTime(data['預約日期'], data['預約時間']);

  try{
    if(location.protocol === 'file:') throw new Error('本機預覽略過電話查重');
    const check = await apiPost({action:'checkPhone', phone:data['電話']});
    if(check.ok && check.data && check.data.length>0){
      showToast('這支電話已經是客戶了，請改用查詢');
      return;
    }
  }catch(err){
    // 本機預覽若無法讀取查重結果，仍允許先新增資料。
  }

  const res = await apiPost({action:'add', sheet:'客戶資料表', data});
  if(res.ok){
    showToast(res.noReadback ? '已送出，請到試算表確認' : '客戶新增成功');
    form.reset();
    loadNotify();
  } else {
    showToast(res.error||'新增失敗');
  }
}

/* ---- 預約名單 ---- */
function dateKey(d){
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function dateLabel(d){
  const wd = ['日','一','二','三','四','五','六'][d.getDay()];
  return `${d.getMonth()+1}/${d.getDate()}（${wd}）`;
}

function renderApptRow(a, options, expired){
  const rowId = a._rowNumber;
  const date = new Date(a['預約日期時間']);
  const pad = n => String(n).padStart(2,'0');
  const timeText = Number.isNaN(date.getTime())
    ? String(a['預約日期時間']||'')
    : (expired
        ? `${date.getMonth()+1}/${date.getDate()} ${pad(date.getHours())}:${pad(date.getMinutes())}`
        : `${pad(date.getHours())}:${pad(date.getMinutes())}`);

  return `
    <div class="appt-row${expired?' expired':''}">
      <span class="time">${timeText}</span>
      <span class="name">${a['客戶姓名']||''}</span>
      <span class="meta">${a['電話']||'—'}</span>
      <span class="meta">${a['預約項目']||''}</span>
      ${a['地點']?`<span class="meta">＠${a['地點']}</span>`:''}
      <select onchange="updateAppointmentStatus('${rowId}', this.value)">${options}</select>
    </div>
  `;
}

async function loadAppointments(){
  const list = document.getElementById('appointmentList');
  list.innerHTML = '<div class="empty-state">讀取中…</div>';
  const res = await apiGet({action:'list', sheet:'預約紀錄表'});
  if(!res.ok){ list.innerHTML = `<div class="empty-state">${res.error||'讀取失敗'}</div>`; return; }

  const active = res.data.filter(a=>{
    const status = String(a['狀態']||'').trim();
    return status !== '已完成' && status !== '已取消' && status !== '未到';
  }).sort((x,y)=>{
    const dx = new Date(x['預約日期時間']).getTime() || 0;
    const dy = new Date(y['預約日期時間']).getTime() || 0;
    return dx - dy;
  });

  if(active.length===0){
    list.innerHTML = `<div class="empty-state"><div class="icon">◇</div>目前沒有待處理的預約</div>`;
    return;
  }

  const now = new Date();
  const todayStr = dateKey(now);
  const tmr = new Date(now); tmr.setDate(tmr.getDate()+1);
  const tomorrowStr = dateKey(tmr);
  const statusOptions = ['已預約','已完成','已取消','未到'];

  const expired = [];
  const groups = [];        // [{key, label, rows:[]}] 依日期排序
  const groupMap = {};

  active.forEach(a=>{
    const current = String(a['狀態']||'已預約').trim();
    const options = statusOptions.map(opt=>
      `<option value="${opt}" ${opt===current?'selected':''}>${opt}</option>`
    ).join('');
    const date = new Date(a['預約日期時間']);
    const valid = !Number.isNaN(date.getTime());

    if(valid && date.getTime() < now.getTime()){
      expired.push(renderApptRow(a, options, true));
      return;
    }

    const key = valid ? dateKey(date) : 'other';
    if(!groupMap[key]){
      let label = '未填日期';
      if(valid){
        if(key === todayStr) label = '今天';
        else if(key === tomorrowStr) label = '明天';
        else label = dateLabel(date);
      }
      groupMap[key] = { label, rows: [] };
      groups.push(groupMap[key]);
    }
    groupMap[key].rows.push(renderApptRow(a, options, false));
  });

  let html = '';
  if(expired.length > 0){
    html += `
      <div class="group-header" style="color:#B44;">
        <span class="group-dot" style="background:#B44;"></span>
        已過期，請更新狀態
        <span class="group-count">（${expired.length}筆）</span>
      </div>
    `;
    html += expired.join('');
  }
  groups.forEach(g=>{
    html += `
      <div class="group-header">
        <span class="group-dot" style="background:var(--accent);"></span>
        ${g.label}
        <span class="group-count">（${g.rows.length}筆）</span>
      </div>
    `;
    html += g.rows.join('');
  });

  list.innerHTML = html;
}

async function updateAppointmentStatus(rowId, status){
  const res = await apiPost({
    action:'updateStatus', sheet:'預約紀錄表',
    id: rowId, updates:{'狀態': status}
  });
  if(res.ok){ showToast('狀態已更新'); loadAppointments(); loadNotify(); }
  else showToast(res.error||'更新失敗');
}

if(isConfigured()){ loadToday(); loadNotify(); }
</script>

</body>
